on:
  push:
    branches:
      - '**'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    env:
      VCPKG_BINARY_SOURCES: default,readwrite

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Install system dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf-archive libltdl-dev libx11-dev libxft-dev libxext-dev \
          libxi-dev libxtst-dev libwayland-dev libxkbcommon-dev \
          libegl1-mesa-dev libibus-1.0-dev libgles2-mesa-dev libxrandr-dev

    - name: Setup CMake
      uses: lukka/get-cmake@v4.3.3

    - name: Debug vcpkg cache env.
      shell: bash
      run: |
        echo "VCPKG_DEFAULT_BINARY_CACHE=[${VCPKG_DEFAULT_BINARY_CACHE}]"
        echo "VCPKG_BINARY_SOURCES=[${VCPKG_BINARY_SOURCES}]"
        echo "VCPKG_ROOT=[${VCPKG_ROOT}]"

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'

    - name: Set up vcpkg binary cache
      uses: actions/cache@v5
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg*.json') }}
      
    - name: Configure CMake
      run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Upload (Windows only)
      uses: actions/upload-artifact@v6
      if: runner.os == 'Windows'
      with:
        name: Output-${{ runner.os }}
        path: build/Release/
